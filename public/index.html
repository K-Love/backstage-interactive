<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Backstage Interactive</title>
  <!-- Add Open Sans font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 0 2rem;
    }
    .main {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      padding: 4rem 2rem;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    .logo {
      max-width: 280px;
      height: auto;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 3rem;
      margin: 1rem 0;
      color: #333;
      font-weight: 700;
      font-family: 'Open Sans', sans-serif;
    }
    p {
      font-size: 1.2rem;
      line-height: 1.5;
      color: #666;
      margin-bottom: 2rem;
      font-family: 'Open Sans', sans-serif;
    }
    .social {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .social a {
      color: #4a4ca3;
      text-decoration: none;
      transition: color 0.3s;
      font-weight: 600;
    }
    .social a:hover {
      color: #3a3c8c;
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="main">
    <img src="/backstage-interactive-logo.png" alt="Backstage Interactive Logo" class="logo">
    
    <h1>Coming Soon</h1>
    
    <p>
      We're redesigning the Backstage Interactive website to serve you better.
      Our new site will be live soon with exciting new features and content.
    </p>
    
    <div class="social">
      <a href="https://x.com/yourusername" target="_blank" rel="noopener noreferrer">X</a>
      <a href="mailto:your@email.com">Contact</a>
    </div>
  </div>
</body>
</html>
